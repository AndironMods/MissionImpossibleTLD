name: MissionImpossible Build

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
  	uses: actions/checkout@v4
  	with:
    	fetch-depth: 0
    	fetch-tags: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    # AUTO-VERSIONING
    - name: Get latest tag
      id: get_tag
      run: |
        $tag = git describe --tags --abbrev=0
        if (-not $tag) { $tag = "v1.0.0" }
        echo "tag=$tag" >> $env:GITHUB_OUTPUT

    - name: Increment version
      id: bump
      run: |
        $old = "${{ steps.get_tag.outputs.tag }}"
        $parts = $old.TrimStart("v").Split(".")
        $major = [int]$parts[0]
        $minor = [int]$parts[1]
        $patch = [int]$parts[2] + 1
        $new = "v$major.$minor.$patch"
        echo "new_version=$new" >> $env:GITHUB_OUTPUT

    - name: Create new tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag ${{ steps.bump.outputs.new_version }}
        git push origin ${{ steps.bump.outputs.new_version }}

    - name: Restore dependencies
      run: dotnet restore QuestMod.csproj

    - name: Build project
      run: dotnet build QuestMod.csproj -c Release

    - name: Prepare release folder
      run: |
        mkdir release
        copy bin\Release\net6.0\MissionImpossible.dll release\
        copy src\GearLookup.json release\
        copy README.md release\
        copy CHANGELOG.md release\
        copy LICENSE release\

    - name: Create ZIP
      run: powershell Compress-Archive -Path release\* -DestinationPath MissionImpossible_release.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MissionImpossible
        path: MissionImpossible_release.zip

  release:
    needs: build
    runs-on: windows-latest

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: MissionImpossible

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.build.outputs.new_version }}
        files: MissionImpossible_release.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
