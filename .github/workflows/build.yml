name: MissionImpossible Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    # ALWAYS USE "latest" VERSION
    - name: Set version
      id: version
      run: |
        echo "new_version=MissionImpossible_latest" >> $env:GITHUB_OUTPUT

    - name: Restore dependencies
      run: dotnet restore QuestMod.csproj

    - name: Build project
      run: dotnet build QuestMod.csproj -c Release

    - name: Prepare release folder
      run: |
        mkdir release
        copy bin\Release\net6.0\MissionImpossible.dll release\
        copy src\GearLookup.json release\
        copy README.md release\
        copy CHANGELOG.md release\
        copy LICENSE release\

    - name: Create ZIP
      run: powershell Compress-Archive -Path release\* -DestinationPath MissionImpossible_latest.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MissionImpossible_latest
        path: MissionImpossible_latest.zip

  release:
    needs: build
    runs-on: windows-latest

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: MissionImpossible_latest

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: master
        name: MissionImpossible_latest
        files: MissionImpossible_latest.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
